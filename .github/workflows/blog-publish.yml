# Promotes blog_posts: review → published (respects scheduled_publish_at when column exists).
# Never publishes draft rows.
name: Blog publish reviewed

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Publish reviewed posts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BLOG_PUBLISH_WEBHOOK_URL: ${{ secrets.BLOG_PUBLISH_WEBHOOK_URL }}
          BLOG_PUBLISH_WEBHOOK_SECRET: ${{ secrets.BLOG_PUBLISH_WEBHOOK_SECRET }}
        run: python scripts/blog_publish_reviewed.py
